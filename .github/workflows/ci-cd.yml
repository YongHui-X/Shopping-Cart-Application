name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: shopping-cart-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: |
          chmod +x mvnw
          ./mvnw -B test

      - name: Build Docker image
        run: docker build -t shopping-cart-app:${{ github.sha }} .

  smoke-test:
    name: Railway Smoke Test
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RAILWAY_APP_URL: ${{ secrets.RAILWAY_APP_URL }}

    steps:
      - name: Smoke test
        if: env.RAILWAY_APP_URL != ''
        run: curl --retry 18 --retry-delay 10 --retry-all-errors --fail "$RAILWAY_APP_URL/health"

      - name: Skip smoke test
        if: env.RAILWAY_APP_URL == ''
        run: echo "RAILWAY_APP_URL is not set; Railway auto-deploy should be verified from the service dashboard."
